<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/footer.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1480.0/aws-sdk.min.js"></script>

    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.0/dist/amazon-cognito-identity.min.js"></script>

    <style>
        #exampleInputEmail1, #exampleInputPassword1 {
            width: 250px;
        }

        #center {
            margin: auto;
            width: 40%;
            padding: 20px;
            background-image: url('/images/2223.jpg');
            background-size: cover;
            border-radius: 10px;
        }

        body {
            background-color: #f5f5f5;
        }

        /* ✅ Chatbot UI Styles */
        #chat-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            font-family: Arial, sans-serif;
        }

        #chat-window {
            display: none;
            width: 300px;
            height: 400px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-direction: column;
        }

        #chat-header {
            background: #0d6efd;
            color: white;
            padding: 10px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-display {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
        }

        .chat-bubble {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 5px;
        }

        .user-msg { background: #e9ecef; text-align: right; }
        .bot-msg { background: #d1e7ff; text-align: left; }

        #chat-button {
            width: 60px;
            height: 60px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            float: right;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>

    <script>
        // 1. AWS & Cognito Config
        AWS.config.region = "us-east-1";
        const poolData = {
            UserPoolId: "us-east-1_b4cOjrAgN",
            ClientId: "1ickidqr4gt0qsbq73l192k628"
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        // 2. Lex Config (⚠️ REPLACE THESE WITH YOUR BOT DETAILS)
        const lexruntime = new AWS.LexRuntime();
        // Persistent session ID
        let sessionId = localStorage.getItem("chatSessionId");
        if (!sessionId) {
            sessionId = "user-" + Math.random().toString(36).substring(2);
            localStorage.setItem("chatSessionId", sessionId);
        }

        const lexConfig = {
            botName: "YourBotName",
            botAlias: "Test",
            userId: sessionId
        };

        // --- Cognito Login Function ---
        function loginUser() {
            const username = document.getElementById("exampleInputEmail1").value;
            const password = document.getElementById("exampleInputPassword1").value;

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({
                Username: username,
                Password: password
            });

            const cognitoUser = new AmazonCognitoIdentity.CognitoUser({
                Username: username,
                Pool: userPool
            });

            cognitoUser.authenticateUser(authDetails, {
                onSuccess: function(result) {
                    const token = result.getIdToken().getJwtToken();
                    localStorage.setItem("token", token);
                    alert("Login successful ✅");
                    window.location.href = "homepage.html";
                },
                onFailure: function(err) {
                    console.error("Login error:", err);
                    alert(err.message || "Login failed ❌");
                }
            });
        }

        // Save chat messages
        function saveMessage(role, text) {
            let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];
            chats.push({ role, text });
            localStorage.setItem("chatHistory", JSON.stringify(chats));
        }

        // Load chat messages on page load
        function loadChat() {
            let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];
            const display = document.getElementById('chat-display');
            chats.forEach(msg => {
                display.innerHTML += `<div class="chat-bubble ${msg.role === 'user' ? 'user-msg' : 'bot-msg'}"><b>${msg.role === 'user' ? 'You' : 'Bot'}:</b> ${msg.text}</div>`;
            });
            display.scrollTop = display.scrollHeight;
        }

        window.onload = loadChat;

        // --- Lex Chat Functions ---
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function pushChat() {
            const input = document.getElementById('chatInput');
            const display = document.getElementById('chat-display');
            const text = input.value.trim();

            if (!text) return;

            // Show User Message
            display.innerHTML += `<div class="chat-bubble user-msg"><b>You:</b> ${text}</div>`;
            saveMessage("user", text);
            input.value = "";

            const params = {
                botAlias: lexConfig.botAlias,
                botName: lexConfig.botName,
                inputText: text,
                userId: lexConfig.userId
            };

            lexruntime.postText(params, function(err, data) {
                if (err) {
                    console.log(err);
                    display.innerHTML += `<div class="chat-bubble bot-msg" style="color:red">Error connecting to bot.</div>`;
                } else {
                    display.innerHTML += `<div class="chat-bubble bot-msg"><b>Bot:</b> ${data.message}</div>`;
                    saveMessage("bot", data.message);
                }
                display.scrollTop = display.scrollHeight;
            });
        }
    </script>
</head>

<body>
    <a href="chatbot.html" class="btn btn-success">Open Chatbot Page</a>
    <div id="center">
        <h2>Sign in</h2>
        <form onsubmit="event.preventDefault(); loginUser();">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="exampleInputEmail1" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="exampleInputPassword1" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <br>

    <div style="padding-left: 120px;">
        <img src="/images/Shoes Sale.jpg" width="300">
        <img src="/images/Shoes Sale4.png" width="300">
        <img src="/images/_Shoes Sale 3.png" width="300">
    </div>

    <div id="chat-wrapper">
        <div id="chat-window">
            <div id="chat-header">
                <span>Support Bot</span>
                <button onclick="toggleChat()" style="background:none; border:none; color:white; font-weight:bold;">X</button>
            </div>
            <div id="chat-display"></div>
            <div class="input-group p-2">
                <input type="text" id="chatInput" class="form-control" placeholder="Type here..." onkeydown="if(event.key === 'Enter') pushChat()">
                <button class="btn btn-primary btn-sm" onclick="pushChat()">Send</button>
            </div>
        </div>
        <button id="chat-button" onclick="toggleChat()">💬</button>
    </div>

</body>
</html>
