<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="/css/footer.css">

    <!-- ✅ AWS SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1480.0/aws-sdk.min.js"></script>

    <!-- ✅ FIXED Cognito SDK (unpkg) -->
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.0/dist/amazon-cognito-identity.min.js"></script>

    <style>
        #exampleInputEmail1, #exampleInputPassword1 {
            width: 250px;
        }

        #center {
            margin: auto;
            width: 40%;
            padding: 20px;
            background-image: url('/images/2223.jpg');
            background-size: cover;
            border-radius: 10px;
        }

        body {
            background-color: #f5f5f5;
        }
    </style>

    <!-- ✅ LOGIN SCRIPT -->
    <script>
        // ✅ Region config
        AWS.config.region = "us-east-1";

        const poolData = {
            UserPoolId: "us-east-1_b4cOjrAgN",
            ClientId: "1ickidqr4gt0qsbq73l192k628"
        };

        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        function loginUser() {
            const username = document.getElementById("exampleInputEmail1").value;
            const password = document.getElementById("exampleInputPassword1").value;

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({
                Username: username,
                Password: password
            });

            const cognitoUser = new AmazonCognitoIdentity.CognitoUser({
                Username: username,
                Pool: userPool
            });

            cognitoUser.authenticateUser(authDetails, {
                onSuccess: function(result) {
                    const token = result.getIdToken().getJwtToken();

                    localStorage.setItem("token", token);

                    alert("Login successful ✅");
                    window.location.href = "homepage.html";
                },

                onFailure: function(err) {
                    console.error("Login error:", err);
                    alert(err.message || "Login failed ❌");
                }
            });
        }
    </script>
</head>

<body>

    <div id="center">
        <h2>Sign in</h2>

        <form onsubmit="event.preventDefault(); loginUser();">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="exampleInputEmail1" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="exampleInputPassword1" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <br>

    <div style="padding-left: 120px;">
        <img src="/images/Shoes Sale.jpg" width="300">
        <img src="/images/Shoes Sale4.png" width="300">
        <img src="/images/_Shoes Sale 3.png" width="300">
    </div>
<div id="chat-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
    <button id="chat-toggle" style="background: #007bff; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
        💬
    </button>
    
    <div id="chat-box" style="display: none; width: 300px; height: 400px; background: white; border: 1px solid #ddd; border-radius: 10px; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <div style="background: #007bff; color: white; padding: 10px; border-radius: 10px 10px 0 0;">Shoe Assistant</div>
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 10px; font-size: 14px;"></div>
        <div style="padding: 10px; border-top: 1px solid #ddd; display: flex;">
            <input type="text" id="user-input" placeholder="Search shoes..." style="flex: 1; border: 1px solid #ccc; padding: 5px; border-radius: 5px;">
            <button onclick="sendMessage()" style="margin-left: 5px; background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 5px;">Send</button>
        </div>
    </div>
</div>
<script>
    // Toggle chat
    document.getElementById("chat-toggle").onclick = function () {
        const box = document.getElementById("chat-box");
        box.style.display = box.style.display === "none" ? "flex" : "none";
    };

    // AWS Lex config
    AWS.config.update({
        region: "us-east-1",
        credentials: new AWS.CognitoIdentityCredentials({
            IdentityPoolId: "YOUR_IDENTITY_POOL_ID"
        })
    });

    const lexruntime = new AWS.LexRuntime();

    function sendMessage() {
        const input = document.getElementById("user-input");
        const message = input.value;

        if (!message) return;

        addMessage("You", message);
        input.value = "";

        const params = {
            botAlias: "YOUR_BOT_ALIAS",
            botName: "YOUR_BOT_NAME",
            inputText: message,
            userId: "user_" + Date.now()
        };

        lexruntime.postText(params, function (err, data) {
            if (err) {
                console.error(err);
                addMessage("Bot", "Error connecting to Lex ❌");
            } else {
                addMessage("Bot", data.message);
            }
        });
    }

    function addMessage(sender, text) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.innerHTML = "<strong>" + sender + ":</strong> " + text;
        div.style.marginBottom = "5px";
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
