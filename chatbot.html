
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1480.0/aws-sdk.min.js"></script>
    
    <style>
        body {
            background: #f5f5f5;
        }
    
        #chat-container {
            width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 600px;
        }
    
        #chat-header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            font-size: 18px;
        }
    
        #chat-display {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
    
        .chat-bubble {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }
    
        .user-msg { background: #e9ecef; text-align: right; }
        .bot-msg { background: #d1e7ff; text-align: left; }
    </style>
    
    <script>
        AWS.config.region = "us-east-1";
    
        // Persistent session
        let sessionId = localStorage.getItem("chatSessionId");
        if (!sessionId) {
            sessionId = "user-" + Math.random().toString(36).substring(2);
            localStorage.setItem("chatSessionId", sessionId);
        }
    
        const lexruntime = new AWS.LexRuntime();
        const lexConfig = {
            botName: "YourBotName",
            botAlias: "Test",
            userId: sessionId
        };
    
        function saveMessage(role, text) {
            let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];
            chats.push({ role, text });
            localStorage.setItem("chatHistory", JSON.stringify(chats));
        }
    
        function loadChat() {
            let chats = JSON.parse(localStorage.getItem("chatHistory")) || [];
            const display = document.getElementById('chat-display');
    
            chats.forEach(msg => {
                display.innerHTML += `<div class="chat-bubble ${msg.role === 'user' ? 'user-msg' : 'bot-msg'}">
                    <b>${msg.role === 'user' ? 'You' : 'Bot'}:</b> ${msg.text}
                </div>`;
            });
    
            display.scrollTop = display.scrollHeight;
        }
    
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const display = document.getElementById('chat-display');
            const text = input.value.trim();
    
            if (!text) return;
    
            display.innerHTML += `<div class="chat-bubble user-msg"><b>You:</b> ${text}</div>`;
            saveMessage("user", text);
    
            input.value = "";
    
            const params = {
                botAlias: lexConfig.botAlias,
                botName: lexConfig.botName,
                inputText: text,
                userId: lexConfig.userId
            };
    
            lexruntime.postText(params, function(err, data) {
                if (err) {
                    display.innerHTML += `<div class="chat-bubble bot-msg" style="color:red">Error</div>`;
                } else {
                    display.innerHTML += `<div class="chat-bubble bot-msg"><b>Bot:</b> ${data.message}</div>`;
                    saveMessage("bot", data.message);
                }
    
                display.scrollTop = display.scrollHeight;
            });
        }
    
        window.onload = loadChat;
    </script>
    </head>
    <body>
        <div id="chat-container">
            <div id="chat-header">Chatbot Support</div>
            <div id="chat-display"></div>

            <div class="input-group p-2">
                <input type="text" id="chatInput" class="form-control"
                       placeholder="Type message..."
                       onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </body>
    </html>
